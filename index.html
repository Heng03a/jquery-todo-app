<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>jQuery To-Do List</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google Font (optional) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-wrapper">
    <header class="app-header">
      <h1 class="app-title">My To-Do List</h1>
      <p class="app-subtitle">
        Simple, responsive jQuery to-do app with localStorage.
      </p>
    </header>

    <main class="app-card">
      <!-- Legend -->
      <section class="legend">
        <div class="legend-item">
          <span class="legend-dot legend-dot-active"></span>
          <span>Active Task</span>
        </div>
        <div class="legend-item">
          <span class="legend-dot legend-dot-completed"></span>
          <span>Completed Task</span>
        </div>
      </section>

      <select id="sort-select">
      <option value="newest">Newest</option>
      <option value="oldest">Oldest</option>
      <option value="completed">Completed First</option>
      <option value="active">Active First</option>
      </select>
      <!-- Input Row -->
      <section class="input-row">
        <input
          id="task-input"
          type="text"
          placeholder="What do you need to do?"
          autocomplete="off"
        />
        <button id="add-task-btn">Add</button>
      </section>

      <!-- Filters + Stats -->
      <section class="toolbar">
        <div class="filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="active">Active</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
        </div>
        <div class="stats">
          <span id="remaining-count">0</span> left •
          <span id="completed-count">0</span> completed
        </div>
      </section>

      <!-- Task List -->
      <ul id="task-list" class="task-list">
        <!-- Tasks will be injected here -->
      </ul>

      <!-- Footer actions -->
      <section class="bottom-actions">
        <button id="clear-completed-btn" class="ghost-btn">
          Clear completed
        </button>
      </section>
    </main>

    <footer class="app-footer">
      <p>Built with HTML, CSS, and jQuery • Tasks saved in your browser</p>
    </footer>
  </div>

  <!-- jQuery CDN -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"
          integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
          crossorigin="anonymous"></script>

  <script src="app.js"></script>
</body>
</html>
